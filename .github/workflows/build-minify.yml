# This workflow builds and publishes selected libraries

name: Build Minified

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.17.0
      - run: yarn install
      - run: yarn build
      - run: yarn test
      - uses: actions/upload-artifact@v4
        with:
          name: result
          path: ./packages/clarity-js/build
          retention-days: 5